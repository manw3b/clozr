name: Build Clozr

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Verify gate: si los tests/lint/build de frontend fallan, no buildeamos
  # los nativos ni publicamos el release. Evita liberar versiones rotas.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Versiones sincronizadas
        run: npm run version:check
      - run: npm run lint
      - name: Typecheck + frontend build
        run: npm run build
      - run: npm test

  # Genera el cuerpo del release a partir de los commits desde el último
  # tag. Output va en `outputs.body` y se inyecta en el release de abajo.
  changelog:
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.gen.outputs.body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: gen
        name: Generar changelog
        run: |
          # Encontrar el tag previo (el inmediatamente anterior al actual).
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -n 1 || true)
          echo "Current: $CURRENT_TAG, Prev: $PREV_TAG"

          if [ -z "$PREV_TAG" ]; then
            RANGE=""
            HEADER="### Cambios"
          else
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
            HEADER="### Cambios desde ${PREV_TAG}"
          fi

          # Lista de commits formateada — saltea los chore: release.
          COMMITS=$(git log --no-merges --pretty=format:"- %s" $RANGE | grep -v "^- chore: release" || true)
          if [ -z "$COMMITS" ]; then
            COMMITS="- (sin cambios visibles)"
          fi

          # Multi-line output para GitHub Actions
          {
            echo "body<<EOF"
            echo "## Clozr ${CURRENT_TAG}"
            echo ""
            echo "$HEADER"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "---"
            echo ""
            echo "### Instaladores"
            echo "- **Windows**: \`.msi\` o \`.exe\`"
            echo "- **macOS Apple Silicon**: \`.dmg\` para aarch64"
            echo "- **macOS Intel**: \`.dmg\` para x86_64"
            echo "- **Linux**: \`.deb\` (Ubuntu/Debian) o \`.AppImage\`"
            echo ""
            echo "### Auto-update"
            echo "Si ya tenés Clozr instalado, la app va a detectar esta versión automáticamente al abrirse."
            echo ""
            echo "### Instalación Windows"
            echo "1. Descargá el archivo \`.msi\`"
            echo "2. Doble click para instalar"
            echo "3. Si Windows muestra advertencia: click en \"Más información\" → \"Ejecutar de todas formas\""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build-tauri:
    needs: [verify, changelog]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Clozr ${{ github.ref_name }}'
          releaseBody: ${{ needs.changelog.outputs.body }}
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}
