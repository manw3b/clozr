# ════════════════════════════════════════════════════════════════════════
#  Clozr — Cloudflare Worker config (auth backend)
# ════════════════════════════════════════════════════════════════════════
#
# Este worker fronteа los flujos de auth (magic link request + verify).
# Los secrets NO van acá — se setean con `wrangler secret put NOMBRE`.
# Ver scripts en package.json (npm run secret:turso-url, etc).
#
# Bindings de prod:
#   TURSO_DATABASE_URL  → libsql://clozr-prod-<org>.turso.io
#   TURSO_AUTH_TOKEN    → JWT con permisos read+write
#   RESEND_API_KEY      → re_xxx (sender configurado por separado)
#   JWT_SECRET          → string aleatorio fuerte para firmar sessions
#
# `vars` (no-secrets) sí pueden vivir acá.

name = "clozr-auth"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# R2 bucket para logos/banners de los workspaces (I).
# El worker accede como `env.ASSETS` (Object storage API binding).
# Pre-requisitos antes del primer deploy con este binding:
#   1. dash.cloudflare.com → R2 → Habilitar (acepta términos, 10GB free,
#      después $0.015/GB/mes — irrelevante a escala chica).
#   2. `npx wrangler r2 bucket create clozr-assets`
#   3. Re-deploy del worker.
# Si activás R2 después de deployar, el binding tira error de schema —
# basta con re-deploy y se resuelve.
[[r2_buckets]]
binding = "ASSETS"
bucket_name = "clozr-assets"

# Sender + asunto del email magic-link. No son secretos.
[vars]
# Sandbox: Resend solo deja mandar emails al owner de la cuenta
# (pyter.import@gmail.com) hasta que verifiquemos un dominio propio.
# Cuando F1.7 conecte un dominio, swappear por "Clozr <login@tudominio>".
RESEND_FROM = "Clozr <onboarding@resend.dev>"
MAGIC_LINK_TTL_MIN = "15"
SESSION_TTL_DAYS = "30"
DEEP_LINK_SCHEME = "clozr"
# NOTA: CORS está abierto (reflejamos el origin que venga) — la lista
# ALLOWED_ORIGINS que estaba acá ya no se usa runtime. La saqué en
# v1.3.38 cuando el WebView2 de Tauri 2 Windows nos dio "Failed to
# fetch" porque su origin no matcheaba la lista whitelisteada.
